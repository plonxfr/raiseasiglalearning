<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raise a SiglaLearning</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- UI for coins/upgrades -->
  <div id="ui" style="position:absolute; top:10px; left:10px; color:white; font-family:sans-serif;">
    Coins: <span id="coins">0</span>
    <button id="feedButton">Feed Sigla (+1 coin)</button>
    <button id="saveBtn">Save Game</button>
    <button id="loadBtn">Load Game</button>
  </div>

  <!-- Three.js library -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>

  <!-- Your game scripts -->
  <script src="save.js"></script>
  <script src="game.js"></script>
</body>
</html>
